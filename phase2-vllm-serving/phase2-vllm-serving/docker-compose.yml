version: "3.8"

# AI Infrastructure Engineering — Phase 2 Observability + Vector Stack
#
# GPU NOTE: Standard `deploy.resources.reservations.devices` GPU syntax
# does NOT work with snap-packaged Docker on this box.
# Use `runtime: nvidia` + NVIDIA_* env vars for any GPU-dependent service.
# See phase1-quantization/docs/DEBUGGING_NOTES.md for full root cause.
#
# Usage:
#   docker-compose up -d
#   docker-compose ps         # verify all containers running
#   docker-compose down -v    # tear down including volumes

services:

  # ── Vector Database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── NVIDIA GPU Hardware Telemetry ───────────────────────────────────────────
  # Exposes VRAM usage, GPU utilization, power draw, temperature at :9400
  # Required for GPU-layer observability that vLLM /metrics doesn't cover
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: dcgm_exporter
    restart: always
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DCGM_EXPORTER_LISTEN=:9400
    ports:
      - "9400:9400"

  # ── Metrics Collection ──────────────────────────────────────────────────────
  # Scrapes vLLM (:8000/metrics) and DCGM (:9400/metrics) every 5 seconds
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus_monitoring
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  # ── Observability Dashboards ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana_dashboards
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  prometheus_data:
  grafana_data:
